name: ioauto-release

services:
  api:
    image: ${REGISTRY_URL:-ghcr.io}/${REGISTRY_NAMESPACE:-sotorivaxl}/ioauto-api:${RELEASE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      API_PORT: 8080
      DB_URL: jdbc:postgresql://${DB_HOST:-ioauto_postgres}:5432/${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DATABASE: ${REDIS_DATABASE:-1}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      APP_DB_ENCRYPTION_KEY: ${APP_DB_ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
      IOAUTO_PLAN_KEY: ${IOAUTO_PLAN_KEY:-ioauto-growth}
      IOAUTO_PLAN_NAME: ${IOAUTO_PLAN_NAME:-IOAuto Growth}
      JAVA_OPTS: ${JAVA_OPTS:-}
    expose:
      - "8080"
    networks:
      - release_internal
      - deploy_shared

  web:
    image: ${REGISTRY_URL:-ghcr.io}/${REGISTRY_NAMESPACE:-sotorivaxl}/ioauto-web:${RELEASE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      API_INTERNAL_BASE: ${API_INTERNAL_BASE:-http://api:8080}
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      JWT_SECRET_FOR_MIDDLEWARE: ${JWT_SECRET_FOR_MIDDLEWARE}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
    expose:
      - "3000"
    networks:
      - release_internal
      - deploy_shared

networks:
  release_internal:
    driver: bridge
  deploy_shared:
    name: ${DEPLOY_NETWORK_NAME:-ioauto_network}
    external: true
