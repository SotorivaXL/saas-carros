name: ioauto-vps

services:
  postgres:
    image: postgres:16
    container_name: ioauto_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ioauto_network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ioauto_api
    restart: unless-stopped
    depends_on:
      - postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      API_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DATABASE: ${REDIS_DATABASE:-1}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      APP_DB_ENCRYPTION_KEY: ${APP_DB_ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
      IOAUTO_PLAN_KEY: ${IOAUTO_PLAN_KEY:-ioauto-growth}
      IOAUTO_PLAN_NAME: ${IOAUTO_PLAN_NAME:-IOAuto Growth}
      JAVA_OPTS: ${JAVA_OPTS:-}
    ports:
      - "127.0.0.1:${API_PORT:-8080}:8080"
    networks:
      - ioauto_network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    container_name: ioauto_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      API_INTERNAL_BASE: ${API_INTERNAL_BASE:-http://api:8080}
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      JWT_SECRET_FOR_MIDDLEWARE: ${JWT_SECRET_FOR_MIDDLEWARE}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    networks:
      - ioauto_network

volumes:
  postgres_data:

networks:
  ioauto_network:
    name: ioauto_network
    driver: bridge
